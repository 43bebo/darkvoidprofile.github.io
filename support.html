<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        mono: {
                            900: '#000000', 800: '#111111', 700: '#222222', 600: '#333333',
                            500: '#555555', 400: '#888888', 300: '#bbbbbb', 100: '#ffffff'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000000; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #333333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555555; }
        .nav-link.active { color: #ffffff; border-bottom: 2px solid #ffffff; }
    </style>
</head>
<body class="text-mono-300 font-sans antialiased min-h-screen flex flex-col">

    <nav class="bg-mono-900 border-b border-mono-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex-shrink-0 flex items-center gap-3">
                    <a href="/"><img src="logo.png" alt="Logo" class="h-8 w-auto rounded object-contain"></a>
                </div>
                <div class="hidden md:flex space-x-8 h-full">
                    <a href="/" class="inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium hover:text-white transition-colors">Home</a>
                    <a href="store" class="inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium hover:text-white transition-colors">Store</a>
                    <a href="discord" class="inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium hover:text-white transition-colors">Discord</a>
                    <a href="support" class="nav-link active inline-flex items-center px-1 pt-1 text-sm font-medium transition-colors hover:text-white">Support</a>
                </div>
                <div class="flex items-center gap-4">
                    <button class="hidden md:flex items-center gap-2 bg-mono-800 hover:bg-mono-700 text-white px-4 py-2 rounded text-sm font-semibold transition border border-mono-600">
                        <i class="fa-brands fa-discord text-lg"></i> Login with Discord
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 flex-grow w-full flex items-center justify-center">
        <div class="bg-mono-800 border border-mono-700 rounded-xl p-8 md:p-12 text-center max-w-xl w-full shadow-2xl shadow-mono-900">
            <div class="w-20 h-20 bg-mono-900 rounded-full flex items-center justify-center mx-auto mb-6 border border-mono-600">
                <i class="fa-solid fa-headset text-3xl text-white"></i>
            </div>
            
            <h1 class="text-3xl font-extrabold text-white mb-2">Support Center</h1>
            <p class="text-mono-400 mb-8 font-medium">
                Online support not available, join discord for help.
            </p>

            <a href="https://discord.gg/YOUR_INVITE_LINK" target="_blank" class="inline-flex items-center justify-center gap-3 w-full bg-white hover:bg-mono-300 text-black px-6 py-4 rounded-lg font-bold text-lg transition">
                <i class="fa-brands fa-discord"></i> Get Support in Discord
            </a>
        </div>
    </main>

    <footer class="bg-mono-900 border-t border-mono-700 py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="text-mono-500 text-sm text-center md:text-left">
                    <p>&copy; 2026 Store. All rights reserved.</p>
                </div>
                <div class="flex gap-4 text-sm font-medium">
                    <a href="terms" class="text-mono-400 hover:text-white transition">Terms & Conditions</a>
                    <a href="terms" class="text-mono-400 hover:text-white transition">Privacy Policy</a>
                    <a href="support" class="text-white border-b border-white transition">Contact Us</a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
