<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        mono: {
                            900: '#000000', 800: '#111111', 700: '#222222', 600: '#333333',
                            500: '#555555', 400: '#888888', 300: '#bbbbbb', 100: '#ffffff'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000000; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #333333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555555; }
        .nav-link.active { color: #ffffff; border-bottom: 2px solid #ffffff; }
    </style>
</head>
<body class="text-mono-300 font-sans antialiased min-h-screen flex flex-col">

    <nav class="bg-mono-900 border-b border-mono-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex-shrink-0 flex items-center gap-3">
                    <a href="index.html"><img src="logo.png" alt="Logo" class="h-8 w-auto rounded object-contain"></a>
                </div>
                <div class="hidden md:flex space-x-8 h-full">
                    <a href="index.html" class="nav-link active inline-flex items-center px-1 pt-1 text-sm font-medium transition-colors hover:text-white">Home</a>
                    <a href="store.html" class="inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium hover:text-white transition-colors">Store</a>
                    <a href="discord.html" class="inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium hover:text-white transition-colors">Discord</a>
                    <a href="support.html" class="inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium hover:text-white transition-colors">Support</a>
                </div>
                <div class="flex items-center gap-4">
                    <button class="hidden md:flex items-center gap-2 bg-mono-800 hover:bg-mono-700 text-white px-4 py-2 rounded text-sm font-semibold transition border border-mono-600">
                        <i class="fa-brands fa-discord text-lg"></i> Login with Discord
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center relative overflow-hidden">
        <div class="absolute inset-0 z-0 flex justify-center items-center opacity-10 pointer-events-none">
            <div class="w-[800px] h-[800px] border border-white rounded-full absolute"></div>
            <div class="w-[600px] h-[600px] border border-white rounded-full absolute"></div>
            <div class="w-[400px] h-[400px] border border-white rounded-full absolute"></div>
        </div>

        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center py-20">
            <h1 class="text-5xl md:text-7xl font-black text-white tracking-tighter mb-6 uppercase">
                Enter The Void
            </h1>
            <p class="text-xl md:text-2xl text-mono-400 mb-10 max-w-2xl mx-auto font-medium">
                Premium digital goods, strictly curated. Secure your keys instantly when restocks go live.
            </p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="store.html" class="bg-white text-black hover:bg-mono-300 font-bold px-8 py-4 rounded transition text-lg">
                    Browse Store
                </a>
                <a href="discord.html" class="bg-mono-800 border border-mono-600 hover:bg-mono-700 text-white font-bold px-8 py-4 rounded transition text-lg flex items-center justify-center gap-2">
                    <i class="fa-brands fa-discord"></i> Join Discord
                </a>
            </div>
        </div>
    </main>

    <footer class="bg-mono-900 border-t border-mono-700 py-8 mt-auto relative z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="text-mono-500 text-sm text-center md:text-left">
                    <p>&copy; 2026 Store. All rights reserved.</p>
                </div>
                <div class="flex gap-4 text-sm font-medium">
                    <a href="terms.html" class="text-mono-400 hover:text-white transition">Terms & Conditions</a>
                    <a href="terms.html" class="text-mono-400 hover:text-white transition">Privacy Policy</a>
                    <a href="support.html" class="text-mono-400 hover:text-white transition">Contact Us</a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
