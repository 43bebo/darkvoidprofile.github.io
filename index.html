<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkVoid</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: #e8e0ff;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
  }

  /* BG */
  #bg { position: fixed; inset: 0; z-index: 0; }

  .noise {
    position: fixed; inset: 0; z-index: 1; opacity: .022; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px; animation: ns .5s steps(1) infinite;
  }
  @keyframes ns {
    0%   { background-position: 0 0; }
    25%  { background-position: -50px 30px; }
    50%  { background-position: 20px -40px; }
    75%  { background-position: -30px -20px; }
  }
  .scanlines {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: repeating-linear-gradient(to bottom, transparent 0, transparent 2px, rgba(0,0,0,.07) 2px, rgba(0,0,0,.07) 4px);
  }
  .vignette {
    position: fixed; inset: 0; z-index: 3; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,.88) 100%);
  }

  /* CORNER DECO */
  .cd { position: fixed; z-index: 5; opacity: 0; animation: fi 1s .3s forwards; }
  .cd.tl { top: 22px; left: 22px; }
  .cd.tr { top: 22px; right: 22px; }
  .cd.bl { bottom: 22px; left: 22px; }
  .cd.br { bottom: 22px; right: 22px; }
  @keyframes fi { to { opacity: 1; } }

  /* SIDE LABELS */
  .sl {
    position: fixed; font-size: 11px; letter-spacing: .3em;
    color: rgba(123,0,255,.3); z-index: 5;
    opacity: 0; font-weight: 600; animation: fi 1s .8s forwards;
  }
  .sl.l { left: 28px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
  .sl.r { right: 28px; top: 50%; transform: translateY(-50%) rotate(90deg); }

  /* MAIN */
  #page {
    position: relative; z-index: 10;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    opacity: 0; animation: fi 1s .2s forwards;
  }

  /* MAIN IMAGE LOGO */
  .main-logo {
    width: clamp(1200px, 40vw, 1600px); /* Responsive sizing: min 150px, max 600px */
    height: auto;
    margin-bottom: 40px; /* Space between logo and links */
    filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.15)); /* Subtle glassy glow */
    object-fit: contain;
  }

  /* --- PURE COLORLESS LIQUID GLASS BLOCKS --- */
  .links {
    display: flex; flex-direction: column; gap: 14px;
    width: min(380px, 88vw);
    opacity: 0; animation: fi .8s .6s forwards; /* Slight delay so logo appears first */
  }

  .link-item {
    display: flex; align-items: center; gap: 16px;
    padding: 15px 22px;
    text-decoration: none; color: #e8e0ff;
    position: relative; overflow: hidden;
    
    /* Core Colorless Glass Effect */
    background: rgba(255, 255, 255, 0.02);
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    
    transition: transform .3s cubic-bezier(.4,0,.2,1), box-shadow .3s, background .3s, border-color .3s;
  }
  
  /* Hover sweeping light effect (Neutral white) */
  .link-item::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, rgba(255,255,255,.04), transparent);
    transform: scaleX(0); transform-origin: left;
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    z-index: 0;
  }
  
  .link-item:hover { 
    transform: translateY(-3px); 
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.2);
    box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
  }
  .link-item:hover::before { transform: scaleX(1); }

  /* Base styling to keep content above the hover effect */
  .link-icon, .link-text, .link-arrow, .c { z-index: 1; position: relative; }

  /* Corner brackets (Neutral bright white on hover) */
  .link-item .c { 
    position: absolute; width: 8px; height: 8px; border-style: solid; 
    border-color: rgba(255, 255, 255, 0.3);
    opacity: 0; transition: opacity .3s, border-color .3s; 
  }
  .link-item:hover .c { opacity: 1; border-color: rgba(255, 255, 255, 0.7); }
  .link-item .c.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-top-left-radius: 12px; }
  .link-item .c.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; border-top-right-radius: 12px;}
  .link-item .c.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; border-bottom-left-radius: 12px;}
  .link-item .c.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-bottom-right-radius: 12px;}

  /* Glass Icon Box (Colorless) */
  .link-icon {
    width: 40px; height: 40px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.08);
    transition: border-color .3s, box-shadow .3s, background .3s;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  
  .link-item:hover .link-icon {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.3);
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
  }
  
  .custom-logo {
    width: 22px;
    height: 22px;
    object-fit: contain;
  }

  .link-text { flex: 1; display: flex; align-items: center; }
  
  .link-name {
    font-weight: 700;
    font-size: 18px; 
    letter-spacing: .1em;
    text-transform: uppercase; color: #fff;
    margin: 0; 
  }

  .link-arrow {
    font-size: 18px; color: rgba(255,255,255,.4);
    font-weight: 700;
    transition: color .3s, transform .3s;
  }
  .link-item:hover .link-arrow { color: #fff; transform: translateX(4px); }

</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="noise"></div>
<div class="scanlines"></div>
<div class="vignette"></div>

<div class="cd tl"><svg width="38" height="38" viewBox="0 0 38 38" fill="none"><path d="M0 38L0 0L38 0" stroke="rgba(0,238,255,.4)" stroke-width="1"/><circle cx="0" cy="0" r="3" fill="rgba(0,238,255,.6)"/></svg></div>
<div class="cd tr"><svg width="38" height="38" viewBox="0 0 38 38" fill="none"><path d="M38 38L38 0L0 0" stroke="rgba(0,238,255,.4)" stroke-width="1"/><circle cx="38" cy="0" r="3" fill="rgba(0,238,255,.6)"/></svg></div>
<div class="cd bl"><svg width="38" height="38" viewBox="0 0 38 38" fill="none"><path d="M0 0L0 38L38 38" stroke="rgba(0,238,255,.4)" stroke-width="1"/><circle cx="0" cy="38" r="3" fill="rgba(0,238,255,.6)"/></svg></div>
<div class="cd br"><svg width="38" height="38" viewBox="0 0 38 38" fill="none"><path d="M38 0L38 38L0 38" stroke="rgba(0,238,255,.4)" stroke-width="1"/><circle cx="38" cy="38" r="3" fill="rgba(0,238,255,.6)"/></svg></div>

<div class="sl l">VOID_PROTOCOL_v2.4 // ONLINE</div>
<div class="sl r">SECTOR_NULL // COORDINATES_LOCKED</div>

<div id="page">
  
  <img src="voidlogo.gif" alt="DarkVoid Logo" class="main-logo">

  <div class="links">

    <a class="link-item" href="https://discord.gg/V8RrggpvzT" target="_blank">
      <span class="c tl"></span><span class="c tr"></span><span class="c bl"></span><span class="c br"></span>
      <div class="link-icon">
        <img src="discord-server.png" alt="Discord Server" class="custom-logo">
      </div>
      <div class="link-text">
        <span class="link-name">Discord — Server</span>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-item" href="https://discord.com/users/751405881018679337" target="_blank">
      <span class="c tl"></span><span class="c tr"></span><span class="c bl"></span><span class="c br"></span>
      <div class="link-icon" style="position:relative;">
        <img src="discord-profile.png" alt="Discord Profile" class="custom-logo">
        <span style="position:absolute;bottom:-3px;right:-3px;width:12px;height:12px;background:#50F418;border-radius:50%;border:2px solid rgba(25,25,30,0.8);"></span>
      </div>
      <div class="link-text">
        <span class="link-name">Discord — Profile</span>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-item" href="https://www.tiktok.com/@void.pg?lang=en" target="_blank">
      <span class="c tl"></span><span class="c tr"></span><span class="c bl"></span><span class="c br"></span>
      <div class="link-icon">
        <img src="tiktok.png" alt="TikTok" class="custom-logo">
      </div>
      <div class="link-text">
        <span class="link-name">TikTok</span>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-item" href="https://steamcommunity.com/id/void_beh/" target="_blank">
      <span class="c tl"></span><span class="c tr"></span><span class="c bl"></span><span class="c br"></span>
      <div class="link-icon">
        <img src="steam.png" alt="Steam" class="custom-logo">
      </div>
      <div class="link-text">
        <span class="link-name">Steam</span>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-item" href="https://kick.com/voided-0" target="_blank">
      <span class="c tl"></span><span class="c tr"></span><span class="c bl"></span><span class="c br"></span>
      <div class="link-icon">
        <img src="kick.png" alt="Kick" class="custom-logo">
      </div>
      <div class="link-text">
        <span class="link-name">Kick</span>
      </div>
      <span class="link-arrow">→</span>
    </a>

  </div>
</div>

<script>
// CANVAS (Animated Fluid Blobs - Dimmed 50%)
const cv = document.getElementById('bg');
const cx = cv.getContext('2d');
let W, H;

function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
window.addEventListener('resize', resize); resize();

// Liquid blobs using theme colors
const blobs = [
  { x: 0.1, y: 0.1, vx: 0.0008, vy: 0.0012, r: 0.5, color: '123,0,255' },   // Purple
  { x: 0.8, y: 0.9, vx: -0.001, vy: -0.0008, r: 0.6, color: '0,238,255' },  // Cyan
  { x: 0.5, y: 0.2, vx: 0.0012, vy: -0.001, r: 0.4, color: '191,0,255' },   // Pinkish Purple
  { x: 0.2, y: 0.8, vx: -0.001, vy: 0.001,  r: 0.5, color: '255,0,60' }     // Red
];

function frame() {
  // Clear with a pure black background to ensure the dim look
  cx.fillStyle = '#000';
  cx.fillRect(0, 0, W, H);
  
  // Render floating blobs
  blobs.forEach(b => {
    b.x += b.vx;
    b.y += b.vy;
    
    // Bounce off invisible boundaries slightly outside the screen
    if (b.x < -0.3 || b.x > 1.3) b.vx *= -1;
    if (b.y < -0.3 || b.y > 1.3) b.vy *= -1;

    const px = b.x * W;
    const py = b.y * H;
    const radius = b.r * Math.max(W, H);

    const g = cx.createRadialGradient(px, py, 0, px, py, radius);
    
    // Dimmed to peak opacity of 20% to match the 50% dimmed request perfectly
    g.addColorStop(0, `rgba(${b.color}, 0.8)`); 
    g.addColorStop(1, `rgba(${b.color}, 0)`);
    
    cx.beginPath();
    cx.fillStyle = g;
    cx.arc(px, py, radius, 0, Math.PI * 2);
    cx.fill();
  });
  
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
