<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkVoid</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #0a0014; 
    color: #e8e0ff;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
  }

  /* --- ENTER SCREEN OVERLAY --- */
  #enter-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: #0a0014;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  
  #enter-screen.hidden {
    opacity: 0; visibility: hidden;
  }

  #enter-text {
    font-size: 26px; font-weight: 700; letter-spacing: 0.2em;
    color: #fff; text-transform: uppercase;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; text-shadow: 0 0 15px rgba(93, 248, 216, 0.6); }
    50% { opacity: 0.4; text-shadow: none; }
  }

  /* --- TOP LEFT VOLUME CONTROL --- */
  #volume-control {
    position: fixed;
    top: 30px;
    left: 30px;
    z-index: 50; 
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 12px 20px;
    
    /* Liquid Glass Effect */
    background: rgba(0, 0, 0, 0.4); /* Darkened for contrast */
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
    
    opacity: 0;
    transform: translateY(-10px);
    transition: opacity 0.8s ease, transform 0.8s ease, background 0.3s, border-color 0.3s;
  }
  
  body.entered #volume-control {
    opacity: 1; 
    transform: translateY(0);
  }

  #volume-control:hover {
    background: rgba(0, 0, 0, 0.6);
    border-color: rgba(255, 255, 255, 0.2);
  }

  #volume-icon {
    color: rgba(255, 255, 255, 0.8);
    transition: color 0.3s;
  }
  #volume-control:hover #volume-icon {
    color: rgba(255, 255, 255, 1);
  }

  /* Custom Range Slider */
  input[type="range"] {
    -webkit-appearance: none;
    width: 100px;
    background: transparent;
  }
  input[type="range"]:focus {
    outline: none;
  }
  input[type="range"]::-webkit-slider-runnable-track {
    width: 100%;
    height: 4px;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 2px;
  }
  input[type="range"]::-webkit-slider-thumb {
    height: 14px;
    width: 14px;
    border-radius: 50%;
    background: #5DF8D8;
    cursor: pointer;
    -webkit-appearance: none;
    margin-top: -5px; 
    box-shadow: 0 0 10px rgba(93, 248, 216, 0.6);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
    box-shadow: 0 0 15px rgba(93, 248, 216, 0.9);
  }

  /* --- VIDEO BACKGROUND --- */
  #bg-video { 
    position: fixed; 
    inset: 0; 
    width: 100vw; 
    height: 100vh; 
    object-fit: cover; 
    z-index: 0; 
  }

  .noise {
    position: fixed; inset: 0; z-index: 1; opacity: .022; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px; animation: ns .5s steps(1) infinite;
  }
  @keyframes ns {
    0%   { background-position: 0 0; }
    25%  { background-position: -50px 30px; }
    50%  { background-position: 20px -40px; }
    75%  { background-position: -30px -20px; }
  }
  .scanlines {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: repeating-linear-gradient(to bottom, transparent 0, transparent 2px, rgba(0,0,0,.07) 2px, rgba(0,0,0,.07) 4px);
  }
  .vignette {
    position: fixed; inset: 0; z-index: 3; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,.88) 100%);
  }

  @keyframes fi { to { opacity: 1; } }

  /* MAIN PAGE */
  #page {
    position: relative; z-index: 10;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    opacity: 0; 
  }
  body.entered #page { animation: fi 1s .2s forwards; }

  /* --- COLORLESS SMOKED GLASS BLOCKS --- */
  .links {
    display: flex; flex-direction: column; gap: 20px;
    width: min(500px, 90vw);
    opacity: 0; 
  }
  body.entered .links { animation: fi .8s .4s forwards; }

  .link-item {
    display: flex; align-items: center; gap: 20px;
    padding: 22px 35px;
    text-decoration: none; color: #e8e0ff;
    position: relative; overflow: hidden;
    
    /* Changed to smoked glass for readability */
    background: rgba(0, 0, 0, 0.4); 
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    
    transition: transform .3s cubic-bezier(.4,0,.2,1), box-shadow .3s, background .3s, border-color .3s;
  }
  
  .link-item::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, rgba(255,255,255,.04), transparent);
    transform: scaleX(0); transform-origin: left;
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    z-index: 0;
  }
  
  .link-item:hover { 
    transform: translateY(-3px); 
    /* Darker on hover */
    background: rgba(0, 0, 0, 0.6);
    border-color: rgba(255, 255, 255, 0.2);
    box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.7), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
  }
  .link-item:hover::before { transform: scaleX(1); }

  .link-icon, .link-text, .link-arrow, .c { z-index: 1; position: relative; }

  .link-item .c { 
    position: absolute; width: 8px; height: 8px; border-style: solid; 
    border-color: rgba(255, 255, 255, 0.3);
    opacity: 0; transition: opacity .3s, border-color .3s; 
  }
  .link-item:hover .c { opacity: 1; border-color: rgba(255, 255, 255, 0.7); }
  .link-item .c.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-top-left-radius: 12px; }
  .link-item .c.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; border-top-right-radius: 12px;}
  .link-item .c.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; border-bottom-left-radius: 12px;}
  .link-item .c.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-bottom-right-radius: 12px;}

  .link-icon {
    width: 50px; height: 50px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.3); /* Matches dark theme */
    border: 1px solid rgba(255, 255, 255, 0.08);
    transition: border-color .3s, box-shadow .3s, background .3s;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  
  .link-item:hover .link-icon {
    background: rgba(0, 0, 0, 0.5);
    border-color: rgba(255, 255, 255, 0.3);
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
  }
  
  .custom-logo {
    width: 28px;
    height: 28px;
    object-fit: contain;
  }

  .link-text { flex: 1; display: flex; align-items: center; justify-content: center; }
  
  .link-name {
    font-weight: 700;
    font-size: 22px; 
    letter-spacing: .1em;
    text-transform: uppercase; 
    color: #fff;
    margin: 0; 
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9); /* Drop shadow for visibility */
  }

  .link-arrow {
    font-size: 24px; color: rgba(255,255,255,.6);
    font-weight: 700;
    transition: color .3s, transform .3s;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9); /* Drop shadow for visibility */
  }
  .link-item:hover .link-arrow { color: #fff; transform: translateX(6px); }

</style>
</head>
<body>

<audio id="bgMusic" loop src="music.mp3"></audio>

<div id="volume-control">
  <svg id="volume-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
  </svg>
  <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.3">
</div>

<div id="enter-screen">
  <span id="enter-text">[ Click or Press Enter ]</span>
</div>

<!-- Replaced Canvas with Video Element -->
<video id="bg-video" autoplay loop muted playsinline>
  <!-- Change 'your-video-file.mp4' to your actual video name -->
  <source src="videoplayback.mp4" type="video/mp4">
</video>

<div class="noise"></div>
<div class="scanlines"></div>
<div class="vignette"></div>

<div id="page">
  <div class="links">

    <a class="link-item" href="https://discord.gg/V8RrggpvzT" target="_blank">
      <span class="c tl"></span><span class="c tr"></span><span class="c bl"></span><span class="c br"></span>
      <div class="link-icon">
        <img src="discord-server.png" alt="Discord Server" class="custom-logo">
      </div>
      <div class="link-text">
        <span class="link-name">Discord — Server</span>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-item" href="https://discord.com/users/751405881018679337" target="_blank">
      <span class="c tl"></span><span class="c tr"></span><span class="c bl"></span><span class="c br"></span>
      <div class="link-icon" style="position:relative;">
        <img src="discord-profile.png" alt="Discord Profile" class="custom-logo">
        <span style="position:absolute;bottom:-3px;right:-3px;width:14px;height:14px;background:#50F418;border-radius:50%;border:2px solid rgba(25,25,30,0.8);"></span>
      </div>
      <div class="link-text">
        <span class="link-name">Discord — Profile</span>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-item" href="https://www.tiktok.com/@void.pg?lang=en" target="_blank">
      <span class="c tl"></span><span class="c tr"></span><span class="c bl"></span><span class="c br"></span>
      <div class="link-icon">
        <img src="tiktok.png" alt="TikTok" class="custom-logo">
      </div>
      <div class="link-text">
        <span class="link-name">TikTok</span>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-item" href="https://steamcommunity.com/id/void_beh/" target="_blank">
      <span class="c tl"></span><span class="c tr"></span><span class="c bl"></span><span class="c br"></span>
      <div class="link-icon">
        <img src="steam.png" alt="Steam" class="custom-logo">
      </div>
      <div class="link-text">
        <span class="link-name">Steam</span>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-item" href="https://kick.com/voided-0" target="_blank">
      <span class="c tl"></span><span class="c tr"></span><span class="c bl"></span><span class="c br"></span>
      <div class="link-icon">
        <img src="kick.png" alt="Kick" class="custom-logo">
      </div>
      <div class="link-text">
        <span class="link-name">Kick</span>
      </div>
      <span class="link-arrow">→</span>
    </a>

  </div>
</div>

<script>
// --- ENTER SCREEN & AUDIO LOGIC ---
const enterScreen = document.getElementById('enter-screen');
const bgMusic = document.getElementById('bgMusic');
const volumeSlider = document.getElementById('volume-slider');
const volumeIcon = document.getElementById('volume-icon');

let hasEntered = false;

// Set initial volume based on the slider value (0.3)
bgMusic.volume = volumeSlider.value;

function enterSite() {
  if (hasEntered) return;
  hasEntered = true;
  
  // Play music
  bgMusic.play().catch(e => console.log("Audio play failed:", e));
  
  // Hide overlay
  enterScreen.classList.add('hidden');
  
  // Trigger main page entrance animations
  document.body.classList.add('entered');
}

// Update volume when slider is dragged
volumeSlider.addEventListener('input', (e) => {
  bgMusic.volume = e.target.value;
  
  // Optional: Change icon slightly if muted
  if (e.target.value == 0) {
    volumeIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>';
  } else {
    volumeIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>';
  }
});

// Listen for mouse click on the screen
enterScreen.addEventListener('click', enterSite);

// Listen for the "Enter" key being pressed
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') enterSite();
});

</script>
</body>
</html>
