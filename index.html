<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkVoid</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent:  #7B00FF;
    --accent2: #00EEFF;
    --glow:    #BF00FF;
    --red:     #FF003C;
    --dim:     #6a5f8a;
  }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: #e8e0ff;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    cursor: none;
  }

  /* CURSOR */
  #cursor {
    position: fixed; width: 10px; height: 10px;
    background: var(--accent2); border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%,-50%);
    mix-blend-mode: screen;
    transition: width .2s, height .2s;
    box-shadow: 0 0 10px var(--accent2), 0 0 28px var(--accent2);
  }
  #cursor-ring {
    position: fixed; width: 34px; height: 34px;
    border: 1px solid rgba(0,238,255,.35); border-radius: 50%;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%,-50%);
    transition: left .1s ease-out, top .1s ease-out;
  }

  /* BG */
  #bg { position: fixed; inset: 0; z-index: 0; }

  .noise {
    position: fixed; inset: 0; z-index: 1; opacity: .022; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px; animation: ns .5s steps(1) infinite;
  }
  @keyframes ns {
    0%   { background-position: 0 0; }
    25%  { background-position: -50px 30px; }
    50%  { background-position: 20px -40px; }
    75%  { background-position: -30px -20px; }
  }
  .scanlines {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: repeating-linear-gradient(to bottom, transparent 0, transparent 2px, rgba(0,0,0,.07) 2px, rgba(0,0,0,.07) 4px);
  }
  .vignette {
    position: fixed; inset: 0; z-index: 3; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,.88) 100%);
  }

  /* CORNER DECO */
  .cd { position: fixed; z-index: 5; opacity: 0; animation: fi 1s .3s forwards; }
  .cd.tl { top: 22px; left: 22px; }
  .cd.tr { top: 22px; right: 22px; }
  .cd.bl { bottom: 22px; left: 22px; }
  .cd.br { bottom: 22px; right: 22px; }
  @keyframes fi { to { opacity: 1; } }

  /* SIDE LABELS */
  .sl {
    position: fixed; font-size: 9px; letter-spacing: .3em;
    color: rgba(123,0,255,.3); z-index: 5;
    opacity: 0; animation: fi 1s .8s forwards;
  }
  .sl.l { left: 28px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
  .sl.r { right: 28px; top: 50%; transform: translateY(-50%) rotate(90deg); }

  /* MAIN */
  #page {
    position: relative; z-index: 10;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    opacity: 0; animation: fi 1s .2s forwards;
  }

  /* LOGO */
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 13vw, 148px);
    letter-spacing: .08em; color: #fff;
    position: relative;
    text-shadow: 0 0 18px var(--glow), 0 0 55px rgba(123,0,255,.45);
    animation: flicker 7s 2s infinite;
    margin-bottom: 4px;
  }
  @keyframes flicker {
    0%,93%,95%,97%,100% { opacity: 1; }
    94%,96% { opacity: .55; }
  }
  .logo::before, .logo::after {
    content: 'DarkVoid'; position: absolute; inset: 0;
    font-family: 'Bebas Neue', sans-serif;
    font-size: inherit; letter-spacing: inherit; text-shadow: none;
  }
  .logo::before {
    color: var(--accent2);
    clip-path: polygon(0 28%, 100% 28%, 100% 48%, 0 48%);
    animation: gb 5s 1.5s infinite;
  }
  .logo::after {
    color: var(--red);
    clip-path: polygon(0 62%, 100% 62%, 100% 76%, 0 76%);
    animation: ga 5s 1.5s infinite;
  }
  @keyframes gb {
    0%,88%,100% { transform: none; opacity: 0; }
    89% { transform: translate(-4px,1px); opacity: .7; }
    90% { transform: translate(3px,-1px); opacity: 0; }
    91% { transform: translate(-2px,2px); opacity: .5; }
    92% { opacity: 0; }
  }
  @keyframes ga {
    0%,88%,100% { transform: none; opacity: 0; }
    89% { transform: translate(4px,-2px); opacity: .6; }
    90.5% { transform: translate(-3px,1px); opacity: 0; }
    91.5% { transform: translate(2px,-1px); opacity: .4; }
    92% { opacity: 0; }
  }

  /* TAGLINE */
  .tagline {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(9px, 1.3vw, 13px);
    letter-spacing: .45em; color: var(--dim);
    text-transform: uppercase; margin-bottom: 52px;
    overflow: hidden; white-space: nowrap;
    border-right: 2px solid var(--accent); width: 0;
    animation: tw 1.4s 1s steps(26) forwards, bl .75s 2.4s step-end 5;
  }
  @keyframes tw { to { width: 26ch; } }
  @keyframes bl { 50% { border-color: transparent; } }

  /* SOCIAL LINKS */
  .links {
    display: flex; flex-direction: column; gap: 14px;
    width: min(380px, 88vw);
    opacity: 0; animation: fi .8s 2.6s forwards;
  }

  .link-item {
    display: flex; align-items: center; gap: 16px;
    border: 1px solid rgba(123,0,255,.28);
    background: rgba(5,0,15,.65);
    padding: 15px 22px;
    text-decoration: none; color: #e8e0ff;
    cursor: none;
    position: relative; overflow: hidden;
    transition: border-color .25s, transform .25s;
  }
  .link-item::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, rgba(0,238,255,.07), transparent);
    transform: scaleX(0); transform-origin: left;
    transition: transform .3s cubic-bezier(.4,0,.2,1);
  }
  .link-item:hover { border-color: var(--accent2); transform: translateX(6px); }
  .link-item:hover::before { transform: scaleX(1); }

  /* corner brackets on each card */
  .link-item .c { position: absolute; width: 6px; height: 6px; border-color: var(--accent2); border-style: solid; opacity: 0; transition: opacity .25s; }
  .link-item:hover .c { opacity: 1; }
  .link-item .c.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .link-item .c.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .link-item .c.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .link-item .c.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .link-icon {
    width: 36px; height: 36px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(0,238,255,.2); border-radius: 4px;
    transition: border-color .25s, box-shadow .25s;
  }
  .link-item:hover .link-icon {
    border-color: var(--accent2);
    box-shadow: 0 0 14px rgba(0,238,255,.35);
  }
  .link-icon svg { width: 18px; height: 18px; fill: var(--accent2); }

  .link-text { flex: 1; }
  .link-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px; letter-spacing: .25em;
    text-transform: uppercase; color: #fff;
    display: block; margin-bottom: 3px;
  }
  .link-handle { font-size: 10px; color: var(--dim); letter-spacing: .1em; }

  .link-arrow {
    font-size: 14px; color: rgba(0,238,255,.4);
    transition: color .25s, transform .25s;
  }
  .link-item:hover .link-arrow { color: var(--accent2); transform: translateX(4px); }
</style>
</head>

<script>
// CURSOR
const cur = document.getElementById('cursor');
const rng = document.getElementById('cursor-ring');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX+'px'; cur.style.top = e.clientY+'px';
  rng.style.left = e.clientX+'px'; rng.style.top = e.clientY+'px';
});
document.querySelectorAll('a').forEach(el => {
  el.addEventListener('mouseenter', () => { cur.style.width='18px'; cur.style.height='18px'; });
  el.addEventListener('mouseleave', () => { cur.style.width='10px'; cur.style.height='10px'; });
});

// CANVAS
const cv = document.getElementById('bg');
const cx = cv.getContext('2d');
let W, H, stars=[], parts=[];

function resize() { W=cv.width=innerWidth; H=cv.height=innerHeight; }
addEventListener('resize', resize); resize();

for (let i=0;i<220;i++) stars.push({x:Math.random()*9999,y:Math.random()*9999,r:Math.random()*1.1,a:Math.random()});

class P {
  constructor(){ this.reset(); }
  reset(){
    this.x = W/2+(Math.random()-.5)*100;
    this.y = H/2+(Math.random()-.5)*100;
    this.vx=(Math.random()-.5)*1.1; this.vy=(Math.random()-.5)*1.1;
    this.life=0; this.max=110+Math.random()*160;
    this.hue=[270,290,180,0][Math.floor(Math.random()*4)];
    this.sz=.7+Math.random()*1.8;
  }
  tick(){
    this.x+=this.vx; this.y+=this.vy;
    this.vx*=.997; this.vy*=.997; this.life++;
    if(this.life>this.max||this.x<0||this.x>W||this.y<0||this.y>H) this.reset();
  }
  draw(){
    const p=this.life/this.max, a=p<.2?p/.2:1-(p-.2)/.8;
    cx.beginPath(); cx.arc(this.x,this.y,this.sz,0,Math.PI*2);
    cx.fillStyle=`hsla(${this.hue},100%,70%,${a*.65})`; cx.fill();
  }
}
for(let i=0;i<180;i++) parts.push(new P());

const rings = Array.from({length:5},(_,i)=>({r:55+i*48,speed:.0007+i*.0004,ang:Math.random()*Math.PI*2,tilt:.14+i*.07}));
let t=0;

function frame(){
  cx.clearRect(0,0,W,H);
  // stars
  stars.forEach(s=>{
    const tw=.3+.7*Math.abs(Math.sin(t*.8+s.x));
    cx.beginPath(); cx.arc(s.x%W,s.y%H,s.r,0,Math.PI*2);
    cx.fillStyle=`rgba(200,190,255,${s.a*tw*.45})`; cx.fill();
  });
  // glow
  const gx=W/2, gy=H/2;
  const g=cx.createRadialGradient(gx,gy,0,gx,gy,280);
  g.addColorStop(0,'rgba(80,0,160,.16)'); g.addColorStop(.5,'rgba(40,0,80,.05)'); g.addColorStop(1,'transparent');
  cx.fillStyle=g; cx.fillRect(0,0,W,H);
  // rings
  cx.save(); cx.translate(gx,gy);
  rings.forEach(r=>{
    r.ang+=r.speed; cx.save();
    cx.rotate(r.ang); cx.scale(1,r.tilt);
    cx.beginPath(); cx.arc(0,0,r.r,0,Math.PI*2);
    cx.strokeStyle=`rgba(123,0,255,${.04+.02*Math.sin(t+r.r)})`; cx.lineWidth=1; cx.stroke();
    cx.restore();
  });
  cx.restore();
  parts.forEach(p=>{p.tick();p.draw();});
  t+=.016; requestAnimationFrame(frame);
}
frame();
</script>
</body>
