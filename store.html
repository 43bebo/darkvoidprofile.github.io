<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        mono: {
                            900: '#000000', 800: '#111111', 700: '#222222', 600: '#333333',
                            500: '#555555', 400: '#888888', 300: '#bbbbbb', 100: '#ffffff'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000000; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #333333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555555; }
        .nav-link.active { color: #ffffff; border-bottom: 2px solid #ffffff; }
        .image-ratio-container { aspect-ratio: 500 / 333; width: 100%; }
    </style>
</head>
<body class="text-mono-300 font-sans antialiased min-h-screen flex flex-col">

    <nav class="bg-mono-900 border-b border-mono-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex-shrink-0 flex items-center gap-3">
                    <a href="index.html"><img src="logo.png" alt="Logo" class="h-8 w-auto rounded object-contain"></a>
                </div>
                <div class="hidden md:flex space-x-8 h-full">
                    <a href="index.html" class="inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium hover:text-white transition-colors">Home</a>
                    <a href="store.html" class="nav-link active inline-flex items-center px-1 pt-1 text-sm font-medium transition-colors hover:text-white">Store</a>
                    <a href="discord.html" class="inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium hover:text-white transition-colors">Discord</a>
                    <a href="support.html" class="inline-flex items-center px-1 pt-1 border-b-2 border-transparent text-sm font-medium hover:text-white transition-colors">Support</a>
                </div>
                <div class="flex items-center gap-4">
                    <button class="relative p-2 text-mono-400 cursor-not-allowed mr-2">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span class="absolute top-0 right-0 inline-flex items-center justify-center px-1.5 py-0.5 text-xs font-bold leading-none text-black bg-mono-400 rounded-full">0</span>
                    </button>
                    <button class="hidden md:flex items-center gap-2 bg-mono-800 hover:bg-mono-700 text-white px-4 py-2 rounded text-sm font-semibold transition border border-mono-600">
                        <i class="fa-brands fa-discord text-lg"></i> Login with Discord
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="relative bg-mono-900 border-b border-mono-700 overflow-hidden">
        <div class="absolute inset-0 z-0 bg-mono-800">
            <div class="absolute inset-0 bg-gradient-to-r from-mono-900 via-mono-900/80 to-transparent"></div>
        </div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 relative z-10 flex flex-col items-start justify-center min-h-[200px]">
            <h1 class="text-4xl font-extrabold text-white mb-2">Store Inventory</h1>
            <p class="text-lg text-mono-400 max-w-2xl">Currently out of stock. Check back later or join our Discord for restock announcements.</p>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow w-full">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
            <h2 class="text-2xl font-bold text-white">All Items</h2>
            <select disabled class="bg-mono-800 border border-mono-700 text-mono-400 text-sm rounded-md block p-2 outline-none cursor-not-allowed">
                <option>Sort by: Featured</option>
            </select>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <script>
                for(let i=1; i<=8; i++) {
                    document.write(`
                    <div class="bg-mono-800 rounded-lg border border-mono-700 overflow-hidden flex flex-col opacity-75">
                        <div class="relative image-ratio-container overflow-hidden bg-mono-900">
                            <img src="item${i}.png" alt="Item ${i}" class="w-full h-full object-cover grayscale">
                            <div class="absolute inset-0 bg-black/60 flex items-center justify-center z-10">
                                <span class="bg-black text-white text-xs font-bold px-3 py-1 rounded border border-mono-500 tracking-widest uppercase">Sold Out</span>
                            </div>
                        </div>
                        <div class="p-4 flex flex-col flex-grow">
                            <h3 class="text-lg font-bold text-mono-300 mb-1 line-through">Product ${i}</h3>
                            <p class="text-xs text-mono-500 mb-4"><i class="fa-brands fa-steam"></i> Steam Key</p>
                            <div class="mt-auto flex items-center justify-between">
                                <div><span class="text-xl font-bold text-mono-500">$--.--</span></div>
                                <button disabled class="bg-mono-900 border border-mono-700 text-mono-500 px-3 py-2 rounded-md font-semibold text-sm cursor-not-allowed">Sold Out</button>
                            </div>
                        </div>
                    </div>`);
                }
            </script>
        </div>
    </main>

    <footer class="bg-mono-900 border-t border-mono-700 py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="text-mono-500 text-sm text-center md:text-left">
                    <p>&copy; 2026 Store. All rights reserved.</p>
                </div>
                <div class="flex gap-4 text-sm font-medium">
                    <a href="terms.html" class="text-mono-400 hover:text-white transition">Terms & Conditions</a>
                    <a href="terms.html" class="text-mono-400 hover:text-white transition">Privacy Policy</a>
                    <a href="support.html" class="text-mono-400 hover:text-white transition">Contact Us</a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
